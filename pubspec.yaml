name: the_quran_project
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  drift: ^2.31.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  path: ^1.9.1

  # Google Fonts for Japanese and English
  google_fonts: ^6.2.1

  # HTML rendering for tafsirs
  flutter_html: ^3.0.0

  # SVG support for ornate borders
  flutter_svg: ^2.0.10

  # Settings persistence
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.31.0
  build_runner: ^2.11.1

